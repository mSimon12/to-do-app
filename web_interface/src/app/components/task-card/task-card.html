<div class="task-card">
    <div class="card-header">
    <span class="priority-indicator" [ngClass]="getPriorityClass()"></span>
    <span class="priority-label">{{ getPriorityLabel() }}</span>
    <div class="spacer"></div>
    <button class="more-btn"><lucide-icon name="more-vertical" [size]="14"></lucide-icon></button>
    </div>
    
    <h3 class="task-title">{{ task.title }}</h3>
    <p class="task-desc" *ngIf="task.description">
    {{ task.description | slice:0:80 }}{{ task.description.length > 80 ? '...' : '' }}
    </p>
    
    <div class="card-footer">
    <div class="meta-item" *ngIf="task.created_at">
        <lucide-icon name="calendar" [size]="12"></lucide-icon>
        <span>{{ task.created_at | date:'MMM d' }}</span>
    </div>
    <div class="spacer"></div>
    
    @if (task.status != null) {
        <div class="status-badge" [ngClass]="task.status.toLowerCase().replace(' ', '-')">
            <lucide-icon [name]="getStatusIcon()" [size]="12"></lucide-icon>
        </div>
    }
    </div>
</div>
