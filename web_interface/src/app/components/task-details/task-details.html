<div class="modal-backdrop" (click)="close.emit()">
    <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
        <h2>{{ task.id ? 'Edit Task' : 'Create Task' }}</h2>
        <button class="close-btn" (click)="close.emit()">
        <lucide-icon name="x"></lucide-icon>
        </button>
    </div>

    <div class="modal-body">
        <div class="form-group">
        <label>Title</label>
        <input [(ngModel)]="task.title" placeholder="Enter task title" class="form-control">
        </div>

        <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="task.description" rows="4" placeholder="Enter details..." class="form-control"></textarea>
        </div>

        <div class="form-row">
        <div class="form-group col">
            <label>Status</label>
            <select [(ngModel)]="task.status" class="form-control">
            <option value="To Do">To Do</option>
            <option value="In Progress">In Progress</option>
            <option value="Done">Done</option>
            </select>
        </div>
        <div class="form-group col">
            <label>Priority</label>
            <select [(ngModel)]="task.priority" class="form-control">
            <option [ngValue]="1">Low</option>
            <option [ngValue]="2">Medium</option>
            <option [ngValue]="3">High</option>
            </select>
        </div>
        </div>
        
        <div class="form-group">
        <label>Due Date</label>
        <input type="date" [(ngModel)]="task.due_date" class="form-control">
        </div>
    </div>

    <div class="modal-footer">
        <button *ngIf="task.id" class="delete-btn" (click)="deleteTask()">Delete</button>
        <div class="spacer"></div>
        <button class="cancel-btn" (click)="close.emit()">Cancel</button>
        <button class="save-btn" (click)="saveTask()">Save Changes</button>
    </div>
    </div>
</div>
